<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>RatarIA</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="app">
    <!-- Topbar -->
    <header class="topbar">
      <div class="brand">
        <img src="../icons/icon-48.png" alt="RatarIA" class="brand-logo" />
        <div class="brand-text">
          <span class="brand-kicker">RatarIA</span>
          <h1 id="title">Acesso Rápido</h1>
        </div>
      </div>
      <div class="topbar-nav">
        <button class="tnav-btn" id="nav-home" data-view="home" title="Ferramentas">⌂</button>
        <button class="tnav-btn" id="nav-creds" data-view="creds" title="Conta atual">⚷</button>
        <button class="tnav-btn" id="nav-proxy" data-view="proxy" title="Proxy">⛬</button>
      </div>
    </header>

    <!-- Status row: sync + proxy -->
    <div class="status-row">
      <div class="sync-pill" id="sync-pill">
        <span class="sync-dot" id="sync-dot"></span>
        <span class="sync-text" id="sync-text">Verificando...</span>
      </div>
      <div class="proxy-pill" id="proxy-pill" title="Status do proxy">
        <span class="proxy-dot" id="proxy-dot"></span>
        <span id="proxy-text">Proxy off</span>
      </div>
    </div>

    <!-- Conteúdo principal (3 views) -->
    <main class="content" id="content">
      <!-- ============ VIEW: HOME (seleção de IAs) ============ -->
      <section class="view" id="view-home" hidden>
        <div class="section-label">Escolha uma IA</div>
        <div class="tool-grid" id="tool-grid"></div>
      </section>

      <!-- ============ VIEW: CREDENCIAIS ============ -->
      <section class="view" id="view-creds" hidden>
        <div id="creds-body"></div>
      </section>

      <!-- ============ VIEW: PROXY ============ -->
      <section class="view" id="view-proxy" hidden>
        <div class="section-label">Configurar proxy</div>

        <div class="proxy-toggle-row">
          <div class="proxy-toggle-text">
            <strong>Roteamento por proxy</strong>
            <span>Quando ativo, ChatGPT e Gemini passam pelo proxy</span>
          </div>
          <label class="toggle">
            <input type="checkbox" id="proxy-enabled" />
            <span class="slider"></span>
          </label>
        </div>

        <form class="proxy-form" id="proxy-form">
          <div class="proxy-field">
            <label>Tipo</label>
            <div class="proxy-type-tabs">
              <label><input type="radio" name="protocol" value="http" checked /><span>HTTP</span></label>
              <label><input type="radio" name="protocol" value="https" /><span>HTTPS</span></label>
              <label><input type="radio" name="protocol" value="socks5" /><span>SOCKS5</span></label>
            </div>
          </div>

          <div class="proxy-field">
            <label>Host</label>
            <input type="text" name="host" placeholder="proxy.exemplo.com" autocomplete="off" />
          </div>

          <div class="proxy-field">
            <label>Porta</label>
            <input type="number" name="port" placeholder="8080" min="1" max="65535" autocomplete="off" />
          </div>

          <div class="proxy-field">
            <label>Usuário <span class="muted">(opcional)</span></label>
            <input type="text" name="username" placeholder="user" autocomplete="off" />
          </div>

          <div class="proxy-field">
            <label>Senha <span class="muted">(opcional)</span></label>
            <input type="password" name="password" placeholder="••••••••" autocomplete="off" />
          </div>

          <button type="submit" class="proxy-save-btn">Salvar e ativar</button>
        </form>

        <div class="proxy-helper" id="proxy-helper"></div>

        <details class="proxy-test">
          <summary>Testar IP atual</summary>
          <div class="proxy-test-body">
            <button type="button" class="proxy-test-btn" id="proxy-test-btn">Verificar IP</button>
            <div id="proxy-test-result"></div>
          </div>
        </details>
      </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <span>v<span id="version">0.0.0</span></span>
      <a href="https://rataria.io/acessar-ferramentas" target="_blank" class="footer-link">rataria.io</a>
    </footer>
  </div>

  <!-- Templates -->
  <template id="tpl-tool-card">
    <button type="button" class="tool-card">
      <img class="tool-card-logo" />
      <span class="tool-card-name"></span>
      <span class="tool-card-arrow">›</span>
    </button>
  </template>

  <template id="tpl-no-tool">
    <div class="state state-empty">
      <div class="state-icon">⌕</div>
      <div class="state-title">Você não está numa ferramenta</div>
      <div class="state-text">Escolha uma na aba <strong>Ferramentas</strong> pra começar.</div>
      <button type="button" class="state-cta" id="go-home-btn">Ver ferramentas</button>
    </div>
  </template>

  <template id="tpl-no-creds">
    <div class="state state-empty">
      <div class="state-icon">!</div>
      <div class="state-title">Sem contas pra <span id="no-creds-tool"></span></div>
      <div class="state-text" id="no-creds-msg">Abra o painel da RatarIA pra sincronizar suas contas.</div>
      <a class="state-cta" href="https://rataria.io/acessar-ferramentas" target="_blank">Abrir painel</a>
    </div>
  </template>

  <template id="tpl-credential-card">
    <article class="cred-card">
      <header class="cred-card-head">
        <img class="cred-tool-logo" />
        <div class="cred-head-text">
          <h2 class="cred-tool-name"></h2>
          <span class="cred-badge">ativo</span>
        </div>
        <button class="cred-fill-btn" title="Preencher na aba ativa">Preencher</button>
      </header>

      <div class="cred-field" data-field="login">
        <label>E-mail / Usuário</label>
        <div class="cred-field-row">
          <span class="cred-value cred-value-login"></span>
          <button class="cred-icon-btn cred-copy" title="Copiar">⎘</button>
        </div>
      </div>

      <div class="cred-field" data-field="senha">
        <label>Senha</label>
        <div class="cred-field-row">
          <span class="cred-value cred-value-senha cred-masked"></span>
          <button class="cred-icon-btn cred-reveal" title="Mostrar senha">○</button>
          <button class="cred-icon-btn cred-copy" title="Copiar">⎘</button>
        </div>
      </div>

      <div class="cred-field cred-field-totp" data-field="totp" hidden>
        <label>Código 2 fatores</label>
        <div class="cred-field-row cred-totp-row">
          <span class="cred-value cred-value-totp">------</span>
          <div class="cred-totp-progress" title=""><span class="cred-totp-bar"></span></div>
          <button class="cred-icon-btn cred-copy" title="Copiar código">⎘</button>
        </div>
      </div>

      <footer class="cred-card-foot">
        <span class="cred-foot-expiry"></span>
      </footer>
    </article>
  </template>

  <script src="popup.js"></script>
</body>
</html>
