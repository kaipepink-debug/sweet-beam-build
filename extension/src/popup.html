<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>RatarIA</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="card">
    <header>
      <img src="../icons/icon-48.png" alt="RatarIA" class="logo" />
      <div class="brand">
        <span class="kicker">RatarIA</span>
        <h1>Acesso Rápido</h1>
      </div>
    </header>

    <div class="status" id="status">
      <div class="status-dot" id="status-dot"></div>
      <div class="status-text">
        <strong id="status-title">Verificando...</strong>
        <span id="status-sub">Aguarde</span>
      </div>
    </div>

    <div class="tools" id="tools-list"></div>

    <a class="cta" id="open-panel" href="https://rataria.io/acessar-ferramentas" target="_blank">Abrir painel da RatarIA</a>

    <footer>
      <span>v<span id="version">0.0.0</span></span>
      <span>rataria.io</span>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
