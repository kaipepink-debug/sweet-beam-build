<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>RatarIA</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="app">
    <!-- ============ SIDEBAR ESQUERDA ============ -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <img src="../icons/icon-48.png" alt="RatarIA" class="brand-logo" />
        <div class="brand-text">
          <span class="brand-kicker">RatarIA</span>
          <strong>Acesso Rápido</strong>
        </div>
      </div>

      <div class="sync-mini" id="sync-mini">
        <span class="sync-dot" id="sync-dot"></span>
        <span id="sync-text">verificando...</span>
      </div>

      <button type="button" class="sidebar-home" id="home-btn" title="Ir pro painel da RatarIA">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9.5L12 3l9 6.5V21H3z" />
          <path d="M9 21V12h6v9" />
        </svg>
        Início
      </button>

      <div class="sidebar-label">Ferramentas</div>
      <nav class="tool-list" id="tool-list"></nav>

      <div class="proxy-banner" id="proxy-banner" hidden>
        <div class="proxy-banner-icon">⛬</div>
        <div class="proxy-banner-text">
          <strong>Proxy ativo</strong>
          <span id="proxy-banner-info">conectado</span>
        </div>
      </div>

      <div class="sidebar-foot">
        <span>v<span id="version">0.0.0</span></span>
      </div>
    </aside>

    <!-- ============ CONTENT DIREITA ============ -->
    <main class="content" id="content">
      <header class="content-head">
        <div>
          <h1 id="content-title">Seus logins</h1>
          <p id="content-sub">Selecione uma ferramenta à esquerda</p>
        </div>
      </header>

      <div class="content-body" id="content-body">
        <div class="state state-loading">
          <div class="spinner"></div>
          <div class="state-text">Carregando...</div>
        </div>
      </div>
    </main>
  </div>

  <!-- ============ TEMPLATES ============ -->
  <template id="tpl-tool-item">
    <button type="button" class="tool-item">
      <img class="tool-item-logo" />
      <span class="tool-item-name"></span>
    </button>
  </template>

  <template id="tpl-empty">
    <div class="state state-empty">
      <div class="state-icon">⌕</div>
      <div class="state-title" id="empty-title">Nenhuma conta</div>
      <div class="state-text" id="empty-msg">Selecione uma ferramenta à esquerda.</div>
    </div>
  </template>

  <template id="tpl-access-btn">
    <button type="button" class="access-btn">
      <img class="access-btn-logo" />
      <div class="access-btn-content">
        <strong>Acessar <span class="access-btn-tool"></span></strong>
        <span>Abre a tela de login numa nova aba</span>
      </div>
      <svg class="access-btn-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14" />
        <path d="M13 5l7 7-7 7" />
      </svg>
    </button>
  </template>

  <template id="tpl-credential-card">
    <article class="cred-card">
      <header class="cred-card-head">
        <img class="cred-tool-logo" />
        <div class="cred-head-text">
          <h2 class="cred-tool-name"></h2>
          <span class="cred-badge">ativo</span>
        </div>
      </header>

      <div class="cred-field" data-field="login">
        <label>E-mail / Usuário</label>
        <div class="cred-field-row">
          <span class="cred-value cred-value-login"></span>
          <button class="cred-icon-btn cred-copy" title="Copiar">⎘</button>
        </div>
      </div>

      <div class="cred-field" data-field="senha">
        <label>Senha</label>
        <div class="cred-field-row">
          <span class="cred-value cred-value-senha cred-masked"></span>
          <button class="cred-icon-btn cred-reveal" title="Mostrar">○</button>
          <button class="cred-icon-btn cred-copy" title="Copiar">⎘</button>
        </div>
      </div>

      <div class="cred-field cred-field-totp" data-field="totp" hidden>
        <label>Código 2 fatores</label>
        <div class="cred-field-row cred-totp-row">
          <span class="cred-value cred-value-totp">------</span>
          <div class="cred-totp-progress" title=""><span class="cred-totp-bar"></span></div>
          <button class="cred-icon-btn cred-copy" title="Copiar código">⎘</button>
        </div>
      </div>

      <footer class="cred-card-foot">
        <span class="cred-foot-expiry"></span>
      </footer>
    </article>
  </template>

  <script src="popup.js"></script>
</body>
</html>
